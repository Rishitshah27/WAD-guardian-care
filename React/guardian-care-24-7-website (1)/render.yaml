services:
  - type: web
    name: guardian-care-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "guardian-care-backend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: guardian-care-db
          property: connectionString

databases:
  - name: guardian-care-db
    plan: free
